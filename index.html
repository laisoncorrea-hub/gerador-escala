<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Escala</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{font-family:Arial,sans-serif;background:#111;color:#fff;padding:20px;max-width:600px;margin:auto}
  textarea,input,select{width:100%;background:#1e1e1e;color:#fff;border:1px solid #444;border-radius:8px;padding:10px;margin-top:8px;font-size:14px;box-sizing:border-box}
  textarea{height:180px;resize:vertical}
.row{display:flex;gap:10px;margin-top:10px}
.row input,.row select{flex:1}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:14px}
.checkbox-row input[type="checkbox"]{width:auto;margin:0}
.campos-manuais{display:none}
.campos-manuais.ativo{display:flex}
  button{margin-top:12px;width:100%;padding:12px;background:#25d366;color:#000;border:none;border-radius:8px;font-weight:bold;font-size:16px;cursor:pointer}
  button:hover{background:#1ebe5d}
  button.secundario{background:#128c7e;color:#fff;margin-top:8px}
  button.secundario:hover{background:#0f7262}
  pre{background:#1e1e1e;padding:12px;border-radius:8px;white-space:pre-wrap;margin-top:15px;border:1px solid #444}
.contador{font-size:12px;color:#aaa;margin-top:5px}
.aviso-duplicados{background:#ff9800;color:#000;padding:8px;border-radius:6px;margin-top:8px;font-size:13px;display:none}
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;box-sizing:border-box
}
.modal.ativo{display:flex}
.modal-conteudo{
  background:#1e1e1e;padding:20px;border-radius:10px;max-width:400px;width:100%;
  border:1px solid #444
}
.modal-conteudo h3{margin-top:0}
.modal-botoes{display:flex;gap:10px;margin-top:15px}
.modal-botoes button{margin:0}
.nome-atual{font-size:18px;font-weight:bold;color:#25d366;margin-bottom:10px}
</style>
</head>
<body>
<h2>📋 Gerador de Escala</h2>
<label>Cole os nomes, um por linha:</label>
<textarea id="nomes" placeholder="joão silva - folga
MARIA souza (chegou)
pedro LIMA @ QUA"></textarea>
<div class="contador" id="contador">0 nomes</div>
<div class="aviso-duplicados" id="avisoDup"></div>

<div class="checkbox-row">
  <input type="checkbox" id="removerDup" checked>
  <label for="removerDup">Remover duplicados automaticamente</label>
</div>

<div class="checkbox-row">
  <input type="checkbox" id="usarAuto" checked>
  <label for="usarAuto">Usar data e dia da semana atual</label>
</div>

<div class="checkbox-row">
  <input type="checkbox" id="escolherHorario">
  <label for="escolherHorario">Escolher horário por pessoa</label>
</div>

<div class="row campos-manuais" id="camposManuais">
  <input id="diaSemana" placeholder="Dia da semana">
  <input id="data" placeholder="Data DD/MM/AAAA">
</div>

<div class="row">
  <input id="horario" placeholder="Horário padrão" value="18:30">
</div>

<button onclick="gerar()">Gerar Escala</button>
<button onclick="copiar()" class="secundario">Copiar Resultado</button>
<button onclick="limpar()" class="secundario" style="background:#444;color:#fff">Limpar Tudo</button>
<pre id="saida">O resultado vai aparecer aqui...</pre>

<!-- Modal de seleção de horário -->
<div class="modal" id="modalHorario">
  <div class="modal-conteudo">
    <h3>Definir Horário</h3>
    <div class="nome-atual" id="nomeAtual"></div>
    <p>Que horas essa pessoa entra?</p>
    <select id="selectHorario">
      <option value="10:15">10:15</option>
      <option value="11:00">11:00</option>
      <option value="15:00">15:00</option>
      <option value="17:00">17:00</option>
      <option value="18:00">18:00</option>
      <option value="19:00">19:00</option>
    </select>
    <div class="modal-botoes">
      <button onclick="confirmarHorario()">Confirmar</button>
      <button class="secundario" onclick="pularNome()">Pular</button>
    </div>
  </div>
</div>

<script>
const diasSemana=['DOMINGO','SEGUNDA-FEIRA','TERÇA-FEIRA','QUARTA-FEIRA','QUINTA-FEIRA','SEXTA-FEIRA','SÁBADO'];
const emojisHorario={
  '10:15':'🕥',
  '11:00':'🕚',
  '15:00':'🕒',
  '17:00':'🕔',
  '18:00':'🕕',
  '19:00':'🕢'
};
let listaParaProcessar=[];
let listaComHorario=[];
let indiceAtual=0;

window.onload=()=>{
  const hoje=new Date();
  document.getElementById('diaSemana').value=diasSemana[hoje.getDay()];
  document.getElementById('data').value=hoje.toLocaleDateString('pt-BR');
  document.getElementById('usarAuto').addEventListener('change',e=>{
    document.getElementById('camposManuais').classList.toggle('ativo',!e.target.checked)
  })

  const dia = String(hoje.getDate()).padStart(2, '0');
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');
  const hora = String(hoje.getHours()).padStart(2, '0');
  const min = String(hoje.getMinutes()).padStart(2, '0');
  document.getElementById('versao').textContent = `Versão ${dia}.${mes}.${hora}${min}`;
}

function limparENomear(nome){
  if (!nome) return '';
  nome = nome.replace(/\b(seg|ter|qua|qui|sex|sab|dom|semanal|FREE|SEM FOLGA|")\.?\b/gi, '').trim();
  let nomeLimpo = nome.split(/[-(:|/@]/)[0].trim();
  nomeLimpo = nomeLimpo.replace(/@+\s*$/, '');
  const preposicoes = ['de','da','do','das','dos'];
  return nomeLimpo
.toLowerCase()
.split(' ')
.filter(p => p.length > 0)
.map(palavra => {
      if (preposicoes.includes(palavra)) return palavra;
      return palavra.charAt(0).toUpperCase() + palavra.slice(1);
    })
.join(' ');
}

function getSaudacao(){
  const agora=new Date();
  const totalMinutos=agora.getHours()*60+agora.getMinutes();
  if(totalMinutos>=300&&totalMinutos<=720)return'Bom dia!';
  if(totalMinutos>720&&totalMinutos<=1080)return'Boa tarde!';
  return'Boa noite!';
}

function gerar(){
  const texto=document.getElementById('nomes').value;
  const hora=document.getElementById('horario').value;
  const removerDup=document.getElementById('removerDup').checked;
  const usarAuto=document.getElementById('usarAuto').checked;
  const escolherHorario=document.getElementById('escolherHorario').checked;

  if(!texto.trim()){
    alert("Cola pelo menos 1 nome!");
    return
  }

  const listaOriginal=texto.split("\n").map(n=>limparENomear(n)).filter(n=>n.length>0);

  const vistos=new Set();
  const duplicados=[];
  const listaSemDup=[];

  listaOriginal.forEach(nome=>{
    const nomeLower=nome.toLowerCase();
    if(vistos.has(nomeLower)){
      if(!duplicados.includes(nome)) duplicados.push(nome)
    }else{
      vistos.add(nomeLower);
      listaSemDup.push(nome)
    }
  });

  const avisoDiv=document.getElementById('avisoDup');
  if(duplicados.length>0){
    avisoDiv.style.display='block';
    avisoDiv.textContent=`⚠️ Duplicados encontrados: ${duplicados.join(', ')}`
  }else{
    avisoDiv.style.display='none'
  }

  listaParaProcessar=removerDup?listaSemDup:listaOriginal;
  listaParaProcessar.sort((a,b)=>a.localeCompare(b,'pt-BR',{sensitivity:'base'}));
  document.getElementById('contador').textContent=`${listaParaProcessar.length} nomes`;

  if(listaParaProcessar.length===0){
    alert("Nenhum nome válido encontrado!");
    return
  }

  if(escolherHorario){
    listaComHorario=[];
    indiceAtual=0;
    mostrarProximoNome();
  }else{
    const listaFinal=listaParaProcessar.map(nome=>({nome,horario:hora}));
    montarResultado(listaFinal, hora, usarAuto);
  }
}

function mostrarProximoNome(){
  if(indiceAtual>=listaParaProcessar.length){
    fecharModal();
    montarResultado(listaComHorario, null, document.getElementById('usarAuto').checked);
    return
  }
  document.getElementById('nomeAtual').textContent=listaParaProcessar[indiceAtual];
  document.getElementById('modalHorario').classList.add('ativo');
}

function fecharModal(){
  document.getElementById('modalHorario').classList.remove('ativo');
}

function confirmarHorario(){
  const horario=document.getElementById('selectHorario').value;
  listaComHorario.push({nome:listaParaProcessar[indiceAtual],horario});
  indiceAtual++;
  mostrarProximoNome();
}

function pularNome(){
  listaComHorario.push({nome:listaParaProcessar[indiceAtual],horario:'18:00'});
  indiceAtual++;
  mostrarProximoNome();
}

function montarResultado(lista, horaUnica, usarAuto){
  let dia,data;
  if(usarAuto){
    const hoje=new Date();
    dia=diasSemana[hoje.getDay()];
    data=hoje.toLocaleDateString('pt-BR')
  }else{
    dia=document.getElementById('diaSemana').value.toUpperCase();
    data=document.getElementById('data').value
    if(!dia ||!data){
      alert("Preencha dia e data!");
      return
    }
  }

  let resultado=`*${getSaudacao()}*

Lembrando… Nosso número oficial é 48 988459939
Se precisar de algo é neste número que deve chamar 👆

🔵 _ESCALA ${dia} - ${data}`;

  if(horaUnica){
    resultado+=` - ${horaUnica}_ 🔵\n\n`;
  }else{
    resultado+=`_ 🔵\n\n`;
  }

  if(horaUnica){
    resultado+=`${linhasNomes(lista)}\n\n`;
  }else{
    const grupos={};
    lista.forEach(p=>{
      if(!grupos[p.horario]) grupos[p.horario]=[];
      grupos[p.horario].push(p);
    });

    const horariosOrdenados=Object.keys(grupos).sort();

    horariosOrdenados.forEach(horario=>{
      const emoji=emojisHorario[horario]||'🕐';
      resultado+=`${emoji} *ENTRAM AS ${horario}*

${linhasNomes(grupos[horario])}

`;
    });
  }

  resultado+=`🛵 💨

*SE CUIDEM NA PISTA!*

➡️ Precisa falar com a logística??

Chamar 48 98845-9939 nosso contato oficial

⚠️ Este contato é único e exclusivamente para lançar escala nos grupo`;

  document.getElementById('saida').textContent=resultado;
}

function linhasNomes(lista){
  return lista.map(p=>`${p.nome} @`).join("\n\n");
}

function copiar(){
  const texto=document.getElementById('saida').textContent;
  if(!texto||texto.includes('resultado vai aparecer')){
    alert("Gere a escala primeiro!");
    return
  }
  navigator.clipboard.writeText(texto).then(()=>{
    alert("✅ Copiado! Já pode colar no WhatsApp")
  }).catch(()=>{
    alert("Erro ao copiar. Seleciona o texto e copia manual")
  })
}

function limpar(){
  document.getElementById('nomes').value='';
  document.getElementById('saida').textContent='O resultado vai aparecer aqui...';
  document.getElementById('contador').textContent='0 nomes';
  document.getElementById('avisoDup').style.display='none';
  listaParaProcessar=[];
  listaComHorario=[];
  fecharModal();
}

document.getElementById('nomes').addEventListener('input',()=>{
  const count=document.getElementById('nomes').value.split("\n").filter(n=>n.trim()).length;
  document.getElementById('contador').textContent=`${count} nomes`
})
</script>
   <footer>
        <p>&copy; 2026.Enjoy :) Todos os direitos reservados.</p>
        <p>LSN</p>
        <p id="versao">Versão --.--.----</p>
    </footer>
</body>
</html>
